site_name: py-canoe
site_url: https://chaitu-ycr.github.io/py-canoe/
site_description: Python 🐍 Package for accessing Vector CANoe 🛶 Tool via COM Interface
site_author: chaitu-ycr

repo_name: ""
repo_url: https://github.com/chaitu-ycr/py-canoe
edit_uri: blob/main/docs/

nav:
  - Home: index.md
  - API Reference:
      - Overview: src_manual.md
      - py_canoe:
          - CANoe: src_manual/py_canoe.md
          - core:
              - application: src_manual/core/application.md
              - bus: src_manual/core/bus.md
              - capl: src_manual/core/capl.md
              - configuration: src_manual/core/configuration.md
              - environment: src_manual/core/environment.md
              - measurement: src_manual/core/measurement.md
              - networks: src_manual/core/networks.md
              - performance: src_manual/core/performance.md
              - simulation: src_manual/core/simulation.md
              - system: src_manual/core/system.md
              - ui: src_manual/core/ui.md
              - version: src_manual/core/version.md

plugins:
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            merge_init_into_class: true
            show_docstring_modules: false
  - include-markdown:
      recursive: true
  - search

theme:
  name: readthedocs
  features:
    - toc.integrate
    - search

extra_css:
  - _assets/extra.css

extra_javascript:
  - https://unpkg.com/mermaid@11.13.0/dist/mermaid.core.mjs
